services:
  db:
    image: docker.io/pgvector/pgvector:pg16
    container_name: chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sst_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - chatbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sst_agent}"]
      interval: 10s
      timeout: 5s
      retries: 10

  chatbot-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-service
    restart: unless-stopped
    environment:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      GROQ_API_KEY: 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
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-sst_agent}
      PORT: ${CHATBOT_PORT:-8000}
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002}
    ports:
      - "${CHATBOT_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  chatbot_postgres_data:
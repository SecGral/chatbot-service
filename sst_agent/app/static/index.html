<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>SST Agent | Asistente de Seguridad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: system-ui, Arial, sans-serif; }

body {
  background: #f4f6fa;
  margin: 0;
}

.container {
  max-width: 850px;
  background: #fff;
  margin: 40px auto;
  box-shadow: 0 0 10px rgba(0,0,0,.1);
  border-radius: 8px;
  overflow: hidden;
}

header {
  background: #0057a8;
  color: #fff;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

#chat {
  height: 65vh;
  overflow-y: auto;
  padding: 15px;
  background: #f9fafc;
}

.message {
  max-width: 80%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
}

.user {
  background:#dcf0ff;
  align-self:flex-end;
  margin-left:auto;
}

.bot {
  background:#e6ffe6;
}

.sources {
  background:#fff8e1;
  font-size:12px;
  border-left:3px solid orange;
  padding:8px;
  margin-top:6px;
}

#input-area {
  display: flex;
  border-top:1px solid #ddd;
}

#question {
  flex: 1;
  border:none;
  padding:12px;
  font-size:14px;
  outline: none;
}

#send {
  background:#0057a8;
  border:none;
  color:#fff;
  padding:0 20px;
  cursor:pointer;
}

#send:disabled {
  background:#aaa;
}

#status {
  font-size:12px;
  padding:5px 15px;
  color:#666;
}

.loading {
  font-style: italic;
  opacity: 0.7;
}
</style>
</head>

<body>
<div class="container">
  <header>SST Agent — Asistente de Seguridad</header>
  <div id="status">Conectado</div>
  <div id="chat"></div>

  <div id="input-area">
    <input id="question" placeholder="Escribe tu pregunta..." />
    <button id="send">Enviar</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("question");
const sendBtn = document.getElementById("send");
const status = document.getElementById("status");

let session_id = localStorage.getItem("session_id");
if(!session_id){
  session_id = crypto.randomUUID();
  localStorage.setItem("session_id", session_id);
}

function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "message " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSources(sources){
  const div = document.createElement("div");
  div.className = "sources";
  let html = "<strong>Fuentes:</strong><br>";
  sources.forEach(s=>{
    html += `📄 ${s.file} (pág. ${s.page})<br>`;
  });
  div.innerHTML = html;
  chat.appendChild(div);
}

async function sendMessage(){
  const q = input.value.trim();
  if(!q) return;

  addMessage(q, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot loading";
  loading.textContent = "Pensando...";
  chat.appendChild(loading);

  sendBtn.disabled = true;
  status.textContent = "Consultando documentos..."

  try {
    const res = await fetch("/api/query", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        question:q,
        session_id:session_id
      })
    });

    const data = await res.json();
    loading.remove();

    addMessage(data.answer, "bot");

    if(data.sources && data.sources.length){
      addSources(data.sources)
    }

    status.textContent = "Listo ✅"

  } catch (err){
    loading.remove();
    addMessage("Error de conexión con el servidor", "bot");
    status.textContent = "Error ❌"
  }

  sendBtn.disabled = false;
}

sendBtn.onclick = sendMessage;
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") sendMessage();
});
</script>
</body>
</html>
